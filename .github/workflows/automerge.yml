name: Auto-merge Copilot PRs

# Three complementary triggers:
#   push         – fires immediately from the pushed commit (no approval needed
#                  for same-repo pushes); finds the open PR for the branch and merges it.
#   pull_request_target – runs from base-branch context (write perms, bypasses the
#                  approval gate that blocks `pull_request` for bot actors).
#   workflow_dispatch   – manual fallback: repo owner can trigger with a PR number.
on:
  push:
    branches:
      - 'copilot/**'
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to merge'
        required: true
        type: number

permissions:
  contents: write       # needed to merge
  pull-requests: write  # needed to approve / ready-for-review

jobs:
  automerge:
    # For push: only run when the pusher is the Copilot coding agent.
    # For pull_request_target: only run for PRs authored by the Copilot coding agent.
    # For workflow_dispatch: always run (maintainer-initiated).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        (github.actor == 'Copilot' || github.actor == 'copilot-swe-agent[bot]')) ||
      (github.event_name == 'pull_request_target' &&
        (github.event.pull_request.user.login == 'Copilot' ||
         github.event.pull_request.user.login == 'copilot-swe-agent[bot]'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "push" ]; then
            # Find the open PR whose head branch matches the pushed branch
            BRANCH="${GITHUB_REF#refs/heads/}"
            PR_NUM=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number -q '.[0].number')
            echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Convert draft → ready (if needed)
        if: steps.pr.outputs.number != ''
        run: |
          if gh pr view "$PR" --repo "$REPO" --json isDraft -q '.isDraft' | grep -q true; then
            gh pr ready "$PR" --repo "$REPO"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}

      - name: Merge PR into main
        if: steps.pr.outputs.number != ''
        run: gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
